<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加分題#2</title>

<style>


  
/* ===== RGB閃爍強化 ===== */
body {
  animation: rgbMove 4s linear infinite, flash 2s infinite;
}

@keyframes flash {
  0%,100% { filter: brightness(1); }
  50% { filter: brightness(1.5); }
}

/* ===== 整頁震動 ===== */
@keyframes shake {
  0%{transform:translate(0)}
  25%{transform:translate(2px,-2px)}
  50%{transform:translate(-2px,2px)}
  75%{transform:translate(2px,2px)}
  100%{transform:translate(0)}
}

/* ===== 滑鼠拖尾 ===== */
.trail {
  position:fixed;
  width:6px;
  height:6px;
  background:cyan;
  border-radius:50%;
  pointer-events:none;
  animation:fade 0.5s linear forwards;
}

@keyframes fade {
  to { opacity:0; transform:scale(3);}
}

/* canvas背景 */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-2;
}

/* 黑霧讓字清楚 */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
  z-index:-1;
}

/* 主框 */
.container{
  width:90%;
  max-width:900px;
  margin:60px auto;
  padding:30px;
  border-radius:20px;
  background:rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
}

/* 按鈕 */
button{
  padding:12px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#00ffff;
  color:black;
  cursor:pointer;
}

button:hover{
  transform:scale(1.2);
}

/* 卡片 */
.card{display:none;}
.card.active{display:block;}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="overlay"></div>

<div class="container">
<h1>朝陽最帥若偉教授的作業系統課程加分題#2</h1>

<div style="text-align:center;">
<button onclick="show('intro')">個人簡介</button>
<button onclick="show('skill')">興趣專長</button>
</div>

<div id="intro" class="card active">
<h2>個人簡介</h2>
<p>姓名：劉以心</p>
<p>學校：朝陽科技大學資工2A</p>
<p>我喜歡睡覺</p>
</div>

<div id="skill" class="card">
<h2>興趣專長</h2>
<p>耍廢、上2690 作業系統 若偉帥氣教授的課程</p>
<p>技能：麻麻 ∫₀^∞ (10e^{-x}+xe^{-x}) dx 摳</p>
</div>
</div>

<script>
// 切換
function show(id){
  let c=document.getElementsByClassName("card");
  for(let i=0;i<c.length;i++) c[i].classList.remove("active");
  document.getElementById(id).classList.add("active");
}

// ===== canvas背景 =====
let canvas=document.getElementById("bg");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

// 星空
let stars=[];
for(let i=0;i<150;i++){
  stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,z:Math.random()*canvas.width});
}

// 矩陣雨
let letters="01";
let matrix=[];
for(let i=0;i<canvas.width/20;i++){
  matrix[i]=1;
}

// 滑鼠
let mouse={x:0,y:0};
document.onmousemove=e=>{
  mouse.x=e.clientX;
  mouse.y=e.clientY;
};

// 點擊爆炸
document.onclick=e=>{
  for(let i=0;i<20;i++){
    ctx.fillStyle="cyan";
    ctx.fillRect(e.clientX+Math.random()*20,e.clientY+Math.random()*20,3,3);
  }
};

// 閃電
function lightning(){
  ctx.strokeStyle="white";
  ctx.beginPath();
  let x=Math.random()*canvas.width;
  ctx.moveTo(x,0);
  for(let i=0;i<10;i++){
    x+=Math.random()*20-10;
    ctx.lineTo(x,i*50);
  }
  ctx.stroke();
}
setInterval(lightning,3000);

// 主動畫
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 星空
  for(let i of stars){
    i.z-=2;
    if(i.z<=0) i.z=canvas.width;
    let k=128/i.z;
    let x=i.x*k+canvas.width/2;
    let y=i.y*k+canvas.height/2;
    ctx.fillStyle="white";
    ctx.fillRect(x,y,2,2);
  }

  // 矩陣雨
  ctx.fillStyle="rgba(0,255,0,0.5)";
  for(let i=0;i<matrix.length;i++){
    let text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*20,matrix[i]*20);
    if(matrix[i]*20>canvas.height) matrix[i]=0;
    matrix[i]++;
  }

  // 滑鼠光暈
  let g=ctx.createRadialGradient(mouse.x,mouse.y,10,mouse.x,mouse.y,100);
  g.addColorStop(0,"rgba(0,255,255,0.5)");
  g.addColorStop(1,"transparent");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  requestAnimationFrame(draw);
}
draw();
  // ===== 滑鼠拖尾（超扯）=====
document.addEventListener("mousemove", e=>{
  let t=document.createElement("div");
  t.className="trail";
  t.style.left=e.clientX+"px";
  t.style.top=e.clientY+"px";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),500);
});

// ===== 點擊爆炸升級 =====
document.onclick=e=>{
  for(let i=0;i<40;i++){
    let d=document.createElement("div");
    d.style.position="fixed";
    d.style.left=e.clientX+"px";
    d.style.top=e.clientY+"px";
    d.style.width="5px";
    d.style.height="5px";
    d.style.background="yellow";
    d.style.borderRadius="50%";
    d.style.transform=`translate(${Math.random()*100-50}px,${Math.random()*100-50}px)`;
    d.style.transition="0.5s";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),500);
  }
};

// ===== 閃電升級（整畫面閃）=====
function bigFlash(){
  let f=document.createElement("div");
  f.style.position="fixed";
  f.style.width="100%";
  f.style.height="100%";
  f.style.background="white";
  f.style.opacity="0.2";
  f.style.top=0;
  f.style.left=0;
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),100);
}
setInterval(bigFlash,2000);

// ===== RGB跟滑鼠互動 =====
document.onmousemove = e=>{
  document.body.style.backgroundPosition =
    (e.clientX / window.innerWidth * 100) + "% " +
    (e.clientY / window.innerHeight * 100) + "%";
};

// ===== 畫面隨機震動 =====
setInterval(()=>{
  document.body.style.animation += ", shake 0.2s";
  setTimeout(()=>document.body.style.animation =
    "rgbMove 4s linear infinite, flash 2s infinite",200);
},3000);
</script>

</body>
</html>
