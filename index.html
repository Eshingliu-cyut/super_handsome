<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加分題#2</title>

<style>
body{
  margin:0;
  font-family:Arial,"Microsoft JhengHei";
  color:white;
  overflow:hidden;
  background: linear-gradient(-45deg,#ff0000,#00ffff,#ff00ff,#00ff00);
  background-size:400% 400%;
  animation: rgbMove 4s linear infinite, flash 2s infinite;
}

@keyframes rgbMove{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

@keyframes flash{
  0%,100%{filter:brightness(1);}
  50%{filter:brightness(1.3);}
}

.trail{
  position:fixed;
  width:6px;
  height:6px;
  background:cyan;
  border-radius:50%;
  pointer-events:none;
  animation:fade 0.5s linear forwards;
}

@keyframes fade{
  to{opacity:0; transform:scale(3);}
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
  z-index:-1;
}

.container{
  width:90%;
  max-width:900px;
  margin:60px auto;
  padding:30px;
  border-radius:20px;
  background:rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
}

button{
  padding:12px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#00ffff;
  color:black;
  cursor:pointer;
}

button:hover{
  transform:scale(1.15);
}

.card{
  display:none;
}

.card.active{
  display:block;
}

@media screen and (max-width:768px){
  .container{
    width:92%;
    margin:30px auto;
    padding:20px;
  }

  button{
    width:100%;
    margin:8px 0;
  }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="overlay"></div>

<div class="container">
  <h1>朝陽最帥若偉教授的作業系統課程加分題#2</h1>
  <p id="device" style="text-align:center; color:#60a5fa;"></p>

  <div style="text-align:center;">
    <button onclick="show('intro')">個人簡介</button>
    <button onclick="show('skill')">興趣專長</button>
  </div>

  <div id="intro" class="card active">
    <h2>個人簡介</h2>
    <p>姓名：劉以心</p>
    <p>學校：朝陽科技大學資工2A</p>
    <p>我喜歡睡覺</p>
  </div>

  <div id="skill" class="card">
    <h2>興趣專長</h2>
    <p>耍廢、上2690 作業系統 若偉帥氣教授的課程</p>
    <p>技能：麻麻 ∫₀^∞ (10e^{-x}+xe^{-x}) dx 摳</p>
  </div>
</div>

<script>
window.onload = function(){
  let isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  let deviceText = document.getElementById("device");

  if(isMobile){
    deviceText.innerText = "📱 手機模式（已降特效）";
  }else{
    deviceText.innerText = "💻 電腦模式（全特效）";
  }

  startSystem(isMobile);
};

function startSystem(isMobile){

  window.show = function(id){
    let c = document.getElementsByClassName("card");
    for(let i=0; i<c.length; i++){
      c[i].classList.remove("active");
    }
    document.getElementById(id).classList.add("active");
  };

  let canvas = document.getElementById("bg");
  let ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let MODE = "HIGH";
  let lowSpec = navigator.hardwareConcurrency <= 4;

  let last = performance.now();
  let frames = 0;
  let fps = 60;

  function fpsCheck(){
    let now = performance.now();
    frames++;
    if(now - last >= 1000){
      fps = frames;
      frames = 0;
      last = now;
      MODE = (fps < 30 || lowSpec || isMobile) ? "LOW" : "HIGH";
    }
    requestAnimationFrame(fpsCheck);
  }
  fpsCheck();

  let stars = [];
  function initStars(n){
    stars = [];
    for(let i=0; i<n; i++){
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height
      });
    }
  }
  initStars(90);

  let letters = "01";
  let matrix = [];
  function initMatrix(step){
    matrix = [];
    for(let i=0; i<canvas.width/step; i++){
      matrix[i] = 1;
    }
  }
  initMatrix(24);

  let mouse = {x:0, y:0};

  document.addEventListener("mousemove", function(e){
    mouse.x = e.clientX;
    mouse.y = e.clientY;

    document.body.style.backgroundPosition =
      (e.clientX / window.innerWidth * 100) + "% " +
      (e.clientY / window.innerHeight * 100) + "%";

    if(MODE === "HIGH" || Math.random() > 0.8){
      let t = document.createElement("div");
      t.className = "trail";
      t.style.left = e.clientX + "px";
      t.style.top = e.clientY + "px";
      document.body.appendChild(t);
      setTimeout(function(){
        t.remove();
      }, 500);
    }
  });

  document.addEventListener("click", function(e){
    let count = (MODE === "HIGH") ? 18 : 8;

    for(let i=0; i<count; i++){
      let d = document.createElement("div");
      d.style.position = "fixed";
      d.style.left = e.clientX + "px";
      d.style.top = e.clientY + "px";
      d.style.width = "5px";
      d.style.height = "5px";
      d.style.background = "yellow";
      d.style.borderRadius = "50%";
      d.style.transform = "translate(" + (Math.random()*100-50) + "px," + (Math.random()*100-50) + "px)";
      d.style.transition = "0.5s";
      document.body.appendChild(d);
      setTimeout(function(){
        d.remove();
      }, 500);
    }
  });

  setInterval(function(){
    if(MODE === "LOW" && Math.random() > 0.2) return;

    ctx.strokeStyle = "white";
    ctx.beginPath();
    let x = Math.random() * canvas.width;
    ctx.moveTo(x, 0);
    for(let i=0; i<8; i++){
      x += Math.random()*20 - 10;
      ctx.lineTo(x, i*55);
    }
    ctx.stroke();
  }, 3500);

  setInterval(function(){
    if(MODE === "HIGH"){
      document.body.style.filter = "hue-rotate(" + Math.random()*360 + "deg)";
    }
  }, 700);

  function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if(MODE === "LOW"){
      if(stars.length > 60) initStars(60);
      if(matrix.length > canvas.width/40) initMatrix(40);
    }else{
      if(stars.length < 90) initStars(90);
      if(matrix.length < canvas.width/24) initMatrix(24);
    }

    for(let i=0; i<stars.length; i++){
      stars[i].y += (MODE === "HIGH") ? 1.2 : 0.6;

      if(stars[i].y > canvas.height){
        stars[i].y = 0;
        stars[i].x = Math.random() * canvas.width;
      }

      ctx.fillStyle = "white";
      ctx.fillRect(stars[i].x, stars[i].y, 4, 4);
    }

    ctx.fillStyle = "rgba(0,255,0,0.35)";
    ctx.font = "16px monospace";
    for(let i=0; i<matrix.length; i++){
      let text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(text, i*24, matrix[i]*20);
      if(matrix[i]*20 > canvas.height){
        matrix[i] = 0;
      }
      matrix[i]++;
    }

    let g = ctx.createRadialGradient(mouse.x, mouse.y, 10, mouse.x, mouse.y, 100);
    g.addColorStop(0, "rgba(0,255,255,0.35)");
    g.addColorStop(1, "transparent");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    requestAnimationFrame(draw);
  }
  draw();

  window.addEventListener("resize", function(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initStars(MODE === "HIGH" ? 90 : 60);
    initMatrix(MODE === "HIGH" ? 24 : 40);
  });
}
</script>

</body>
</html>
