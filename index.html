<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超瘋狂網站</title>

<style>
body {
  margin:0;
  font-family:Arial,"Microsoft JhengHei";
  color:white;
  overflow:hidden;
  background:black;
}

/* ===== 背景canvas ===== */
canvas {
  position:fixed;
  top:0;
  left:0;
  z-index:-2;
}

/* ===== 黑遮罩（讓字清楚） ===== */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* ===== 主框 ===== */
.container {
  width:90%;
  max-width:900px;
  margin:60px auto;
  padding:30px;
  border-radius:20px;
  background:rgba(0,0,0,0.85);
  backdrop-filter: blur(15px);
  box-shadow:0 0 30px rgba(0,0,0,0.8);
}

/* ===== 標題 ===== */
h1 {
  text-align:center;
  font-size:36px;
  letter-spacing:3px;
}

/* ===== 按鈕 ===== */
button {
  padding:12px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#00ffff;
  color:black;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  transform:scale(1.1);
  background:#00ff99;
}

/* ===== 卡片 ===== */
.card {
  display:none;
  margin-top:20px;
  padding:20px;
  background:rgba(255,255,255,0.1);
  border-radius:15px;
}

.card.active {
  display:block;
}

/* 手機 */
@media screen and (max-width:768px){
  h1 {font-size:24px;}
  button {width:100%;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="overlay"></div>

<div class="container">
  <h1>⚡ 超瘋狂個人網站 ⚡</h1>

  <div style="text-align:center;">
    <button onclick="show('intro')">個人簡介</button>
    <button onclick="show('skill')">興趣專長</button>
  </div>

  <div id="intro" class="card active">
    <h2>個人簡介</h2>
    <p>姓名：劉以心</p>
    <p>學校：朝陽科技大學 資工系2A</p>
    <p>我喜歡睡覺</p>
  </div>

  <div id="skill" class="card">
    <h2>興趣專長</h2>
    <p>耍廢、2690作業系統神課</p>
    <p>技能：∫₀^∞ (10e^{-x}+xe^{-x}) dx = 10</p>
  </div>
</div>

<script>
// 切換
function show(id){
  let c=document.getElementsByClassName("card");
  for(let i=0;i<c.length;i++) c[i].classList.remove("active");
  document.getElementById(id).classList.add("active");
}

// ===== 超瘋狂背景 =====
let canvas=document.getElementById("bg");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];
for(let i=0;i<200;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    z:Math.random()*canvas.width
  });
}

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let i of stars){
    i.z-=2;
    if(i.z<=0) i.z=canvas.width;

    let k=128/i.z;
    let x=i.x*k+canvas.width/2;
    let y=i.y*k+canvas.height/2;

    let size=(1-i.z/canvas.width)*3;
    ctx.fillStyle="white";
    ctx.fillRect(x,y,size,size);
  }

  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
