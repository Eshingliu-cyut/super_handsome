<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>超炫個人網站</title>

<style>
body {
  margin: 0;
  font-family: Arial,"Microsoft JhengHei";
  overflow-x: hidden;
  color: white;
  background: black;
}

/* ===== 粒子背景 ===== */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* ===== 主框 ===== */
.container {
  width: 90%;
  max-width: 900px;
  margin: 50px auto;
  background: rgba(0,0,0,0.6);
  padding: 30px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  animation: float 3s infinite ease-in-out;
  border: 2px solid transparent;
  background-clip: padding-box;
}

/* RGB邊框 */
.container::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 20px;
  background: linear-gradient(90deg,red,orange,yellow,green,cyan,blue,purple,red);
  background-size: 300%;
  animation: rgb 5s linear infinite;
  z-index: -1;
}

@keyframes rgb {
  0%{background-position:0%}
  100%{background-position:300%}
}

@keyframes float {
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

/* ===== 標題 ===== */
h1 {
  text-align: center;
  font-size: 36px;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow:0 0 10px white;}
  to { text-shadow:0 0 30px cyan;}
}

/* ===== 打字效果 ===== */
.typing {
  text-align:center;
  border-right:2px solid white;
  white-space:nowrap;
  overflow:hidden;
  width:0;
  animation: typing 3s steps(30,end) forwards, blink .5s infinite;
}

@keyframes typing {
  to { width: 100%; }
}
@keyframes blink {
  50%{border-color:transparent;}
}

/* ===== 按鈕 ===== */
button {
  padding: 12px 20px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(45deg,#00f,#0ff);
  color:white;
  cursor:pointer;
  transition:0.3s;
  position: relative;
  overflow: hidden;
}

button:hover {
  transform: scale(1.2);
}

/* 波紋 */
button::after {
  content:"";
  position:absolute;
  width:0;
  height:0;
  background:rgba(255,255,255,0.5);
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

button:active::after {
  width:200px;
  height:200px;
  transition:0.5s;
}

/* ===== 卡片 ===== */
.card {
  display:none;
  padding:20px;
  background:rgba(255,255,255,0.1);
  border-radius:15px;
}

.card.active {
  display:block;
}

/* 手機 */
@media screen and (max-width:768px){
  body {background: #022;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
  <h1>⚡ 超炫個人網站 ⚡</h1>

  <p class="typing">系統載入中...歡迎來到最強網頁</p>

  <div style="text-align:center;">
    <button onclick="show('intro')">個人簡介</button>
    <button onclick="show('skill')">興趣專長</button>
  </div>

  <div id="intro" class="card active">
    <h2>個人簡介</h2>
    <p>姓名：劉以心</p>
    <p>學校：朝陽科技大學 資工系2A</p>
    <p>我喜歡睡覺與當最強工程師</p>
  </div>

  <div id="skill" class="card">
    <h2>興趣專長</h2>
    <p>耍廢、上2690若偉神課</p>
    <p>技能：∫₀^∞ (10e^{-x}+xe^{-x}) dx = 10</p>
  </div>
</div>

<script>
// 切換
function show(id){
  let c=document.getElementsByClassName("card");
  for(let i=0;i<c.length;i++){c[i].classList.remove("active");}
  document.getElementById(id).classList.add("active");
}

// 粒子背景
let canvas=document.getElementById("bg");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let p=[];
for(let i=0;i<100;i++){
  p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:Math.random()*2-1,vy:Math.random()*2-1});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";
  for(let i of p){
    ctx.beginPath();
    ctx.arc(i.x,i.y,2,0,Math.PI*2);
    ctx.fill();
    i.x+=i.vx;
    i.y+=i.vy;
  }
  requestAnimationFrame(draw);
}
draw();

// 點擊爆炸
document.onclick=e=>{
  let d=document.createElement("div");
  d.style.position="fixed";
  d.style.left=e.clientX+"px";
  d.style.top=e.clientY+"px";
  d.style.width="10px";
  d.style.height="10px";
  d.style.background="cyan";
  d.style.borderRadius="50%";
  d.style.animation="boom 0.6s forwards";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),600);
};

</script>

<style>
@keyframes boom{
  to{
    transform:scale(10);
    opacity:0;
  }
}
</style>

</body>
</html>
